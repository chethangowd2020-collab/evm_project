<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Election Results | ClassRep EVM</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="results-page">
  <nav class="navbar">
    <div class="navbar-brand">
      <img class="logo-icon" src="/static/logo.webp" alt="ClassRep EVM logo">
      <span>ClassRep EVM</span>
    </div>
    <div class="navbar-links">
      <a href="/dashboard" class="nav-link">← Dashboard</a>
      <a href="/logout" class="btn-nav-logout">Logout</a>
    </div>
  </nav>

  <div class="page-content" style="max-width:1000px;margin:0 auto;padding:2rem 1rem;position:relative;z-index:1;">
    <div style="margin-bottom:2.5rem;text-align:center;">
      <div class="page-title" style="font-size:2.5rem;">Election Results</div>
      <p class="page-subtitle">The people have spoken. Here are the final standings for the Class Representative positions.</p>
    </div>

    <div id="resultBox">
      <div class="empty-state" style="padding:4rem;">
        <div class="empty-icon" style="font-size:3.5rem;">⏳</div>
        <p style="font-size:1.1rem;">Fetching latest results...</p>
      </div>
    </div>
  </div>

  <script src="/static/script.js?v=2"></script>
  <script>
    function renderCandidate(c, isWinner, maxVotes) {
      const pct = maxVotes > 0 ? Math.round((c.votes / maxVotes) * 100) : 0;
      return `
        <div class="result-row ${isWinner ? 'winner' : ''}" style="margin-bottom:12px;">
          <span class="rank" style="font-size:1.2rem;">${isWinner ? '🥇' : '🥈'}</span>
          <div class="vote-bar-wrap">
            <div class="rname" style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;">
              <span style="font-weight:700;font-size:1rem;color:var(--text);">${c.name}</span>
              <span style="font-size:0.8rem;color:var(--text-soft);">${c.usn}</span>
            </div>
            <div class="vote-bar" style="height:8px;background:var(--border);border-radius:10px;overflow:hidden;">
              <div class="vote-bar-fill" style="width:${pct}%;height:100%;background:${isWinner ? 'var(--grad2)' : 'var(--grad1)'};border-radius:10px;transition:width 1s ease-out;"></div>
            </div>
          </div>
          <div class="rvotes" style="text-align:right;min-width:60px;">
            <div style="font-size:1.1rem;font-weight:800;color:var(--primary);">${c.votes}</div>
            <div style="font-size:0.65rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--text-soft);">Votes</div>
          </div>
        </div>
      `;
    }

    async function loadPublicResults() {
      try {
        const res = await fetch('/api/results_public');
        const data = await res.json();
        const box = document.getElementById("resultBox");

        if (!data.success) {
          box.innerHTML = `
            <div class="card" style="text-align:center;padding:4rem 2rem;">
              <div style="font-size:4rem;margin-bottom:1.5rem;">📢</div>
              <h2 style="font-family:'DM Serif Display',serif;font-size:1.8rem;margin-bottom:0.5rem;color:var(--text);">Results Pending</h2>
              <p style="color:var(--text-soft);max-width:400px;margin:0 auto 1.5rem;">The election results have not been published by the administrator yet. Please check back later.</p>
              <button class="btn btn-secondary" onclick="location.reload()">🔄 Check Again</button>
            </div>
          `;
          return;
        }

        let html = "";
        const classList = Object.keys(data.classes);

        if (classList.length === 0) {
           box.innerHTML = `<div class="empty-state"><p>No results found.</p></div>`;
           return;
        }

        for (let cls of classList) {
          const group = data.classes[cls];
          const maxMaleVotes = group.males.length ? Math.max(...group.males.map(m => m.votes), 1) : 1;
          const maxFemaleVotes = group.females.length ? Math.max(...group.females.map(f => f.votes), 1) : 1;

          html += `
            <div class="results-class" style="margin-bottom:2.5rem;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);">
              <div class="results-class-header" style="background:var(--grad1);color:white;padding:1.2rem 1.8rem;display:flex;align-items:center;gap:10px;">
                <span style="font-size:1.4rem;">🏫</span>
                <span style="font-weight:800;font-size:1.2rem;letter-spacing:-0.02em;">${cls} REPRESENTATIVES</span>
              </div>
              
              <div class="results-grid" style="display:grid;grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));gap:1px;background:var(--border);">
                
                <!-- Male Section -->
                <div style="background:white;padding:1.5rem;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;color:var(--primary);">
                    <span style="font-size:1.2rem;">👨</span>
                    <h4 style="margin:0;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;font-size:0.85rem;">Male Candidates</h4>
                  </div>
                  ${group.males.length ? 
                    group.males.map((m, idx) => renderCandidate(m, idx === 0, maxMaleVotes)).join('') : 
                    '<p style="color:var(--text-soft);font-size:0.9rem;font-style:italic;">No male candidates registered.</p>'}
                </div>

                <!-- Female Section -->
                <div style="background:white;padding:1.5rem;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:1.5rem;color:var(--accent);">
                    <span style="font-size:1.2rem;">👩</span>
                    <h4 style="margin:0;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;font-size:0.85rem;">Female Candidates</h4>
                  </div>
                  ${group.females.length ? 
                    group.females.map((f, idx) => renderCandidate(f, idx === 0, maxFemaleVotes)).join('') : 
                    '<p style="color:var(--text-soft);font-size:0.9rem;font-style:italic;">No female candidates registered.</p>'}
                </div>

              </div>
            </div>
          `;
        }
        box.innerHTML = html;
      } catch (err) {
        console.error(err);
        document.getElementById("resultBox").innerHTML = `
          <div class="card" style="text-align:center;padding:3rem;">
            <p style="color:var(--danger);font-weight:600;">⚠️ Connection error. Please try again.</p>
          </div>
        `;
      }
    }

    loadPublicResults();
  </script>
</body>
</html>
