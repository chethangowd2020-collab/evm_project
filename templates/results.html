<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Results | ClassRep EVM</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-brand">
      <img class="logo-icon" src="/static/sjbit-logo.png" alt="ClassRep EVM logo">
      <span>ClassRep EVM</span>
    </div>
    <div class="navbar-links">
      <a href="/admin" class="nav-link">← Admin</a>
      <a href="/logout" class="btn-nav-logout">Logout</a>
    </div>
  </nav>

  <div class="page-content" style="max-width:960px;margin:0 auto;padding:2rem 1rem;position:relative;z-index:1;">
    <div style="margin-bottom:2rem;">
      <div class="page-title">Election Results</div>
      <div class="page-subtitle">Live vote count by class — <span id="totalVotesLabel">Loading...</span></div>
    </div>

    <!-- Summary banner -->
    <div class="card" id="summaryBanner" style="padding:1.2rem 1.5rem;margin-bottom:1.5rem;background:linear-gradient(135deg,rgba(91,108,249,0.06),rgba(168,85,247,0.06));">
      <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap;">
        <div style="flex:1;">
          <div style="font-weight:700;font-size:1rem;margin-bottom:0.2rem;">🏆 Admin-Only Results View</div>
          <div style="font-size:0.85rem;color:var(--text-soft);">Winners are highlighted with a gold border. Vote counts update in real-time.</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="loadResults()">🔄 Refresh</button>
      </div>
    </div>

    <div id="resultsContainer">
      <div class="empty-state" style="padding:3rem;">
        <div class="empty-icon" style="font-size:3rem;">⏳</div>
        <p>Loading results...</p>
      </div>
    </div>
  </div>

  <script src="/static/script.js?v=2"></script>
  <script>
    function renderResultRow(c, isWinner, maxVotes) {
      const pct = maxVotes > 0 ? Math.round(c.votes / maxVotes * 100) : 0;
      return `
        <div class="result-row ${isWinner ? 'winner' : ''}">
          <span class="rank">${isWinner ? '🥇' : '🥈'}</span>
          <div class="vote-bar-wrap">
            <div class="rname" style="font-size:1.1rem;font-weight:600;">${c.name} <small style="font-weight:500;font-size:0.95rem;color:var(--text-soft);">(${c.usn})</small></div>
            <div class="vote-bar">
              <div class="vote-bar-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="rvotes">${c.votes} <small style="font-weight:400;font-size:0.75rem;">votes</small></div>
          ${isWinner ? '<span class="badge badge-warning">Winner</span>' : ''}
        </div>`;
    }

    async function loadResults() {
      const d = await apiGet('/api/admin/results');
      if (!d.success) {
        window.location.href = '/login';
        return;
      }

      document.getElementById('totalVotesLabel').textContent = `Total votes cast: ${d.total_votes}`;
      const container = document.getElementById('resultsContainer');

      const classNames = Object.keys(d.classes);
      if (!classNames.length) {
        container.innerHTML = `
          <div class="card" style="text-align:center;padding:3rem;">
            <div style="font-size:3rem;margin-bottom:1rem;">📭</div>
            <h3 style="font-weight:700;margin-bottom:0.4rem;">No Results Yet</h3>
            <p style="color:var(--text-soft);">No candidates have been enrolled or no votes have been cast yet.</p>
          </div>`;
        return;
      }

      container.innerHTML = classNames.map(cls => {
        const data = d.classes[cls];
        const males = data.males || [];
        const females = data.females || [];
        const maxMaleVotes = males.length ? Math.max(...males.map(c => c.votes), 1) : 1;
        const maxFemaleVotes = females.length ? Math.max(...females.map(c => c.votes), 1) : 1;

        const maleRows = males.length
          ? males.map((c, i) => renderResultRow(c, i === 0, maxMaleVotes)).join('')
          : '<div class="empty-state" style="padding:1rem;"><p>No male candidates</p></div>';

        const femaleRows = females.length
          ? females.map((c, i) => renderResultRow(c, i === 0, maxFemaleVotes)).join('')
          : '<div class="empty-state" style="padding:1rem;"><p>No female candidates</p></div>';

        const totalClassVotes = [...males, ...females].reduce((s, c) => s + c.votes, 0);

        return `
          <div class="results-class">
            <div class="results-class-header">
              🏫 ${cls}
              <span style="margin-left:auto;font-size:0.85rem;opacity:0.8;font-weight:400;">${totalClassVotes} total votes</span>
            </div>
            <div class="results-grid">
              <div class="results-gender-col">
                <h4>👨 Male Candidates</h4>
                ${maleRows}
              </div>
              <div class="results-gender-col">
                <h4>👩 Female Candidates</h4>
                ${femaleRows}
              </div>
            </div>
          </div>`;
      }).join('');
    }

    loadResults();
  </script>
</body>
</html>
