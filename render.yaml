services:
  - type: web
    name: smart-evm
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.9
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USN
        value: ADMIN
      - key: ADMIN_PASSWORD
        sync: false
